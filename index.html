<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boutique Elégance - Mostaganem</title>
    <style>
        body {
            background: linear-gradient(135deg, #2c1a4d, #0f0826);
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        /* Effet Glassmorphism */
        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 30px;
            width: 85%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }
        h1 { color: #d4af37; font-size: 24px; margin-bottom: 20px; } /* Couleur Or */
        .link {
            display: block;
            background: rgba(212, 175, 55, 0.1);
            border: 1px solid #d4af37;
            color: #fff;
            padding: 12px;
            margin: 15px 0;
            border-radius: 10px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
        }
        .link:hover { background: #d4af37; color: #2c1a4d; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Boutique Élégance</h1>
        <p>Retrouvez-nous sur nos réseaux :</p>
        <a class="link" href="https://instagram.com/ta_page" target="_blank">Instagram</a>
        <a class="link" href="https://facebook.com/ta_page" target="_blank">Facebook</a>
        <a class="link" href="https://wa.me/213XXXXXXX" target="_blank">WhatsApp</a>
    </div>
</body>
</html>
