<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boutique Élégance | Mostaganem</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Configuration de base et arrière-plan Boutique de nuit */
        body {
            background: radial-gradient(circle at top right, #2c1a4d 0%, #130a26 50%, #080410 100%);
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Conteneur Principal Glassmorphism */
        .card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(212, 175, 55, 0.2); /* Bordure Or subtile */
            border-radius: 24px;
            width: 90%;
            max-width: 380px;
            padding: 35px 25px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5), 
                        inset 0 1px 2px rgba(255, 255, 255, 0.1);
            animation: fadeIn 1s ease-out;
        }

        /* Logo Étoile / Robe stylisée */
        .logo-container {
            margin-bottom: 15px;
        }
        .logo-icon {
            font-size: 3rem;
            color: #d4af37; /* Couleur Or métallique */
            text-shadow: 0 0 15px rgba(212, 175, 55, 0.4);
        }

        h1 {
            font-size: 26px;
            font-weight: 600;
            letter-spacing: 1px;
            margin: 10px 0 5px 0;
            background: linear-gradient(135deg, #fff 30%, #d4af37 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-size: 12px;
            color: #b3a5cd;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 30px;
        }

        /* Style des Boutons de Liens */
        .links-container {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .btn-link {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 14px;
            padding: 16px 20px;
            color: #ffffff;
            text-decoration: none;
            font-size: 15px;
            font-weight: 500;
            letter-spacing: 0.5px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .btn-link i:first-child {
            font-size: 20px;
            width: 30px;
            text-align: left;
            color: #d4af37;
        }

        .arrow-icon {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.4);
            transition: transform 0.3s;
        }

        /* Effets Tactiles et Hover Rétroéclairé */
        .btn-link:active, .btn-link:hover {
            background: rgba(212, 175, 55, 0.15);
            border-color: #d4af37;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.2);
            transform: translateY(-2px);
        }

        .btn-link:hover .arrow-icon {
            transform: translateX(4px);
            color: #d4af37;
        }

        /* Effet d'apparition fluide */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        footer {
            margin-top: 35px;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.3);
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="logo-container">
            <i class="fa-solid fa-wand-magic-sparkles logo-icon"></i>
        </div>
        <h1>BOUTIQUE ÉLÉGANCE</h1>
        <div class="subtitle">Mostaganem • Haute Couture</div>

        <div class="links-container">
            <a href="#" class="btn-link" target="_blank">
                <span><i class="fa-brands fa-instagram"></i> Catalogue Instagram</span>
                <i class="fa-solid fa-chevron-right arrow-icon"></i>
            </a>

            <a href="#" class="btn-link" target="_blank">
                <span><i class="fa-brands fa-facebook-f"></i> Page Facebook</span>
                <i class="fa-solid fa-chevron-right arrow-icon"></i>
            </a>

            <a href="#" class="btn-link" target="_blank">
                <span><i class="fa-brands fa-whatsapp"></i> Contact WhatsApp</span>
                <i class="fa-solid fa-chevron-right arrow-icon"></i>
            </a>

            <a href="#" class="btn-link" id="shareBtn">
                <span><i class="fa-solid fa-share-nodes"></i> Partager cette page</span>
                <i class="fa-solid fa-chevron-right arrow-icon"></i>
            </a>
        </div>

        <footer>© 2026 Boutique Élégance</footer>
    </div>

    <script>
        document.getElementById('shareBtn').addEventListener('click', function(e) {
            e.preventDefault();
            // Utilise l'API de partage native du smartphone si disponible
            if (navigator.share) {
                navigator.share({
                    title: 'Boutique Élégance',
                    text: 'Découvrez nos robes de soirées exclusives à Mostaganem !',
                    url: window.location.href
                }).then(() => {
                    console.log('Partage réussi !');
                }).catch((err) => {
                    console.log('Erreur de partage:', err);
                });
            } else {
                // Copie alternative dans le presse-papier si le partage natif n'est pas supporté (PC)
                navigator.clipboard.writeText(window.location.href);
                alert("Lien de la boutique copié dans votre presse-papier !");
            }
        });
    </script>
</body>
</html>
